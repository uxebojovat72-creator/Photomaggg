version: "3.9"

services:
  postgres:
    image: postgres:15-alpine
    container_name: priceradar-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: priceradar
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: priceradar
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init-db.sql:/docker-entrypoint-initdb.d/init.sql:ro
    networks:
      - priceradar
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U priceradar -d priceradar"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: priceradar-redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD} --appendonly yes
    volumes:
      - redis_data:/data
    networks:
      - priceradar
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    image: ghcr.io/uxebojovat72-creator/priceradar-api:latest
    container_name: priceradar-api
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "4000:4000"
    environment:
      DATABASE_URL: postgresql://priceradar:${POSTGRES_PASSWORD}@postgres:5432/priceradar?sslmode=disable
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379
      NODE_ENV: production
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET}
      CORS_ORIGINS: ${CORS_ORIGINS}
      FRONTEND_URL: ${FRONTEND_URL}
      PORT: "4000"
      HOST: "0.0.0.0"
    networks:
      - priceradar

volumes:
  postgres_data:
  redis_data:

networks:
  priceradar:
    driver: bridge
